  <style>
    *{
        padding: 0;
        margin: 0;
        box-sizing: border-box;
        font-family: sans-serif;
    }
    body {
      color: #0f0;
      background-size: cover;
      background-color: #0c1821;
      background-position: center center;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      /*padding-top: 100px;*/
      padding-bottom: 100px;
      text-align: center;
      position: relative;
    }
    body::after{
        content: '';
        position: absolute;
        display: block;
        height: 100%;
        width: 100%;
        /*background-color: rgb(0, 0, 0, 0.9);*/
        z-index: -1;
    }
    .wrapper {
      margin: auto 0;
    }
    #canvas {
      outline: black 3px solid;
    }
  </style>
</head>
<body>
  <div>
    <!-- <button onclick="drawCardDown()">Draw Card</button>
    <button onclick="drawCardUp()">Draw Face Card</button> -->
    <button onclick="reset()">Reset</button>
    <button onclick="shuffle()">Shuffle</button>
    <button onclick="deal()">Deal</button>
    <button onclick="undo()">Undo</button>
    <div class="wrapper">
      <!-- <canvas id="canvas" width="1200" height="700">Your browser doesn't support canvas</canvas> -->
      <canvas id="canvas" width="1200" height="700">Your browser doesn't support canvas</canvas>
    </div>

</body>
